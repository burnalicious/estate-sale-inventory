services:
  postgres:
    image: postgres:16
    container_name: estatesale-db
    environment:
      POSTGRES_DB: estatesale
      POSTGRES_USER: estatesale
      POSTGRES_PASSWORD: estatesale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estatesale"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: estatesale-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/estatesale
      SPRING_DATASOURCE_USERNAME: estatesale
      SPRING_DATASOURCE_PASSWORD: estatesale
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: estatesale-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
