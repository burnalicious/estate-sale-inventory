name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: estatesale
          POSTGRES_USER: estatesale
          POSTGRES_PASSWORD: estatesale
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U estatesale"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: Harmony/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn test -B

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Harmony/frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Harmony/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
